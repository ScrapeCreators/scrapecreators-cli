name: publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: verify manual publish branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "manual publish must run from ${DEFAULT_BRANCH} (got ${GITHUB_REF_NAME})"
            exit 1
          fi

      - name: verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: install dependencies
        run: npm ci

      - name: lockfile sync check
        run: npm run check:lockfile

      - name: audit dependencies
        run: npm audit --audit-level=high

      - name: run tests
        run: npm test

      - name: publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SECRET }}
